<aside id="recent-posts-2" class="widget widget_recent_entries">
    <h4 class="widget-title">Popular Posts</h4>
    <ul>
        {% for post in collections.post %}
            {% if loop.index0 < 6 %}
                <li>
                <a href="{{ post.url }}">{{post.data.title}}</a>
                </li>
            {% endif %}
        {% endfor %}
    </ul>
</aside>
